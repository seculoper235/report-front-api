## 공통 설정. 환경별 설정은 application-local.yml / application-prod.yml 로 분리한다.
## 활성 프로필은 환경변수 SPRING_PROFILES_ACTIVE 로 주입(미지정 시 local).
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # DataSource/JPA 공통
  main:
    allow-bean-definition-overriding: true
  sql:
    init:
      encoding: UTF-8
  output:
    ansi:
      enabled: always

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  liquibase:
    change-log: db/changelog.yaml

# 스케줄러 cron 설정 (Spring cron 표현식: 초 분 시 일 월 요일)
scheduler:
  # 고정 지출 자동 등록: 매일 자정 실행
  fixed-cost:
    cron: "0 0 0 * * *"

# 서버 실행 관련(포트 등)
server:
  compression:
    enabled: true
    mime-types: text/html,text/plain,text/css,application/javascript,application/json
    min-response-size: 500
  port: 8080

jwt:
  EXPIRATION_MILLISECONDS: 3600000  # 2 * 1000 * 60 * 30L
  REFRESH_EXPIRATION_MILLISECONDS: 86400000 # 48 * 1000 * 60 * 30L

# 이미지 저장(S3). 자격증명은 DefaultCredentialsProvider(환경변수/인스턴스 프로파일)로 해결.
aws:
  s3:
    region: ${AWS_REGION:ap-northeast-2}
    # 상품 썸네일(공개). public-read 또는 CloudFront 구성 전제.
    public-bucket: ${AWS_S3_PUBLIC_BUCKET:report-front-public}
    # 바코드 이미지(비공개). 퍼블릭 액세스 차단, 조회 시 presigned GET으로만 노출.
    private-bucket: ${AWS_S3_PRIVATE_BUCKET:report-front-private}
    # 공개 버킷의 CDN/커스텀 도메인 base URL(없으면 S3 가상호스팅 URL 사용).
    public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
    # presigned URL 만료(초).
    presign-expiry-seconds: ${AWS_S3_PRESIGN_EXPIRY:600}
