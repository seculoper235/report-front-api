spring:
  profiles:
    group:
      server: production
    active: server
---
## 기본 서버 환경 설정

# Spring 관련
spring:
  config:
    activate:
      on-profile: production
  devtools:
    add-properties: false
  output:
    ansi:
      enabled: always

  # DataSource 설정
  main.allow-bean-definition-overriding: true
  sql.init.encoding: UTF-8
  datasource:
    hikari:
      driver-class-name: org.postgresql.Driver
      jdbc-url: jdbc:postgresql://${DB_HOST:localhost}:5432/daily?characterEncoding=utf-8
      username: ${DB_USER:devteller}
      password: ${DB_PASSWORD:devteller123!}

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  liquibase:
    change-log: db/changelog.yaml

  # Docker Compose 설정 (compose 파일을 docker/ 하위로 이동)
  docker:
    compose:
      file: docker/docker-compose.yml

  # Redis 설정 (refresh 토큰 저장 / access 토큰 블랙리스트)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}

