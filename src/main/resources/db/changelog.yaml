databaseChangeLog:
  - property:
      dbms: postgresql, h2
      name: function.now
      value: now()
  - objectQuotingStrategy: QUOTE_ALL_OBJECTS
  - changeSet:
      id: create-cost
      author: DevTeller
      changes:
        - createTable:
            tableName: rpt_cost
            columns:
              - column:
                  name: rpt_cost_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cat_nm
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: fixed_yn
                  type: varchar(1)
                  constraints:
                    nullable: false
              - column:
                  name: cost_nm
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: cost_desc
                  type: varchar(255)
              - column:
                  name: cost_amt
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: cost_mtd
                  type: varchar(8)
                  constraints:
                    nullable: false
              - column:
                  name: pay_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: cost_dvsn
                  type: varchar(8)
              - column:
                  name: cost_pnt
                  type: int
              - column:
                  name: crt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: crt_by
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: udt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: udt_by
                  type: bigint
                  constraints:
                    nullable: false
  - changeSet:
      id: create-habit
      author: DevTeller
      changes:
        - createTable:
            tableName: rpt_habit
            columns:
              - column:
                  name: report_habt_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: habt_nm
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: habt_dvsn
                  type: varchar(20)
              - column:
                  name: habt_pnt
                  type: int
              - column:
                  name: crt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: crt_by
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: udt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: udt_by
                  type: bigint
                  constraints:
                    nullable: false
  - changeSet:
      id: modify-cost-amt-to-numeric
      author: DevTeller
      changes:
        - modifyDataType:
            tableName: rpt_cost
            columnName: cost_amt
            newDataType: numeric
  - changeSet:
      id: add-cost-amt-div
      author: DevTeller
      changes:
        - addColumn:
            tableName: rpt_cost
            columns:
              - column:
                  name: cost_amt_div
                  type: varchar(8)
                  constraints:
                    nullable: false
  - changeSet:
      id: create-user
      author: DevTeller
      changes:
        - createTable:
            tableName: rpt_user
            columns:
              - column:
                  name: rpt_user_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: crt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: crt_by
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: udt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: udt_by
                  type: bigint
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: rpt_user
            columnNames: email
            constraintName: uk_user_email
  - changeSet:
      id: add-user-id-to-cost-habit
      author: DevTeller
      changes:
        - addColumn:
            tableName: rpt_cost
            columns:
              - column:
                  name: user_id
                  type: bigint
        - addColumn:
            tableName: rpt_habit
            columns:
              - column:
                  name: user_id
                  type: bigint
        - addNotNullConstraint:
            tableName: rpt_cost
            columnName: user_id
            columnDataType: bigint
            defaultNullValue: 0
        - addNotNullConstraint:
            tableName: rpt_habit
            columnName: user_id
            columnDataType: bigint
            defaultNullValue: 0
  - changeSet:
      id: create-gifticon
      author: DevTeller
      changes:
        - createTable:
            tableName: rpt_product
            columns:
              - column:
                  name: rpt_product_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: brand
                  type: varchar(100)
              - column:
                  name: image_url
                  type: varchar(500)
              - column:
                  name: point_cost
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  constraints:
                    nullable: false
              - column: { name: crt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: crt_by, type: bigint, constraints: { nullable: false } }
              - column: { name: udt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: udt_by, type: bigint, constraints: { nullable: false } }
        - createTable:
            tableName: rpt_gift_inventory
            columns:
              - column:
                  name: gift_inventory_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: barcode_image_url
                  type: varchar(500)
              - column:
                  name: valid_until
                  type: date
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: redemption_order_id
                  type: bigint
              - column: { name: crt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: crt_by, type: bigint, constraints: { nullable: false } }
              - column: { name: udt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: udt_by, type: bigint, constraints: { nullable: false } }
        - createIndex:
            tableName: rpt_gift_inventory
            indexName: idx_inventory_product_status
            columns:
              - column:
                  name: product_id
              - column:
                  name: status
        - createTable:
            tableName: rpt_redemption_order
            columns:
              - column:
                  name: redemption_order_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: point_cost
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: idempotency_key
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: gift_inventory_id
                  type: bigint
              - column: { name: crt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: crt_by, type: bigint, constraints: { nullable: false } }
              - column: { name: udt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: udt_by, type: bigint, constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: rpt_redemption_order
            columnNames: idempotency_key
            constraintName: uk_redemption_idem
  - changeSet:
      id: create-point-ledger
      author: DevTeller
      changes:
        - createTable:
            tableName: report_point
            columns:
              - column:
                  name: report_point_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: delta
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: ref_type
                  type: varchar(30)
              - column:
                  name: ref_id
                  type: bigint
              - column: { name: crt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: crt_by, type: bigint, constraints: { nullable: false } }
              - column: { name: udt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: udt_by, type: bigint, constraints: { nullable: false } }
        - createIndex:
            tableName: report_point
            indexName: idx_point_user
            columns:
              - column:
                  name: user_id
        # 기존 소비 적립을 원장으로 backfill (GOOD +, BAD -, 포인트 있는 건만). QUOTE_ALL_OBJECTS에 맞춰 식별자 인용.
        - sql:
            dbms: postgresql, h2
            sql: >-
              INSERT INTO "report_point" ("user_id", "delta", "reason", "ref_type", "ref_id", "crt_at", "crt_by", "udt_at", "udt_by")
              SELECT "user_id",
                     CASE WHEN "cost_dvsn" = 'GOOD' THEN "cost_pnt" ELSE -"cost_pnt" END,
                     'EARN_COST', 'REPORT_COST', "rpt_cost_id",
                     now(), "user_id", now(), "user_id"
              FROM "rpt_cost"
              WHERE "cost_dvsn" IS NOT NULL AND "cost_pnt" IS NOT NULL;
