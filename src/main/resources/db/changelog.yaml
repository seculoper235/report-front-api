databaseChangeLog:
  - property:
      dbms: postgresql, h2
      name: function.now
      value: now()
  - objectQuotingStrategy: QUOTE_ALL_OBJECTS
  - changeSet:
      id: create-cost
      author: DevTeller
      changes:
        - createTable:
            tableName: rpt_cost
            columns:
              - column:
                  name: rpt_cost_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cat_nm
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: fixed_yn
                  type: varchar(1)
                  constraints:
                    nullable: false
              - column:
                  name: cost_nm
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: cost_desc
                  type: varchar(255)
              - column:
                  name: cost_amt
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: cost_mtd
                  type: varchar(8)
                  constraints:
                    nullable: false
              - column:
                  name: pay_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: cost_dvsn
                  type: varchar(8)
              - column:
                  name: cost_pnt
                  type: int
              - column:
                  name: crt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: crt_by
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: udt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: udt_by
                  type: bigint
                  constraints:
                    nullable: false
  - changeSet:
      id: create-habit
      author: DevTeller
      changes:
        - createTable:
            tableName: rpt_habit
            columns:
              - column:
                  name: report_habt_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: habt_nm
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: habt_dvsn
                  type: varchar(20)
              - column:
                  name: habt_pnt
                  type: int
              - column:
                  name: crt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: crt_by
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: udt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: udt_by
                  type: bigint
                  constraints:
                    nullable: false
  - changeSet:
      id: modify-cost-amt-to-numeric
      author: DevTeller
      changes:
        - modifyDataType:
            tableName: rpt_cost
            columnName: cost_amt
            newDataType: numeric
  - changeSet:
      id: add-cost-amt-div
      author: DevTeller
      changes:
        - addColumn:
            tableName: rpt_cost
            columns:
              - column:
                  name: cost_amt_div
                  type: varchar(8)
                  constraints:
                    nullable: false
  - changeSet:
      id: create-user
      author: DevTeller
      changes:
        - createTable:
            tableName: rpt_user
            columns:
              - column:
                  name: rpt_user_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: crt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: crt_by
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: udt_at
                  type: datetime
                  defaultValue: ${function.now}
                  constraints:
                    nullable: false
              - column:
                  name: udt_by
                  type: bigint
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: rpt_user
            columnNames: email
            constraintName: uk_user_email
  - changeSet:
      id: add-user-id-to-cost-habit
      author: DevTeller
      changes:
        - addColumn:
            tableName: rpt_cost
            columns:
              - column:
                  name: user_id
                  type: bigint
        - addColumn:
            tableName: rpt_habit
            columns:
              - column:
                  name: user_id
                  type: bigint
        - addNotNullConstraint:
            tableName: rpt_cost
            columnName: user_id
            columnDataType: bigint
            defaultNullValue: 0
        - addNotNullConstraint:
            tableName: rpt_habit
            columnName: user_id
            columnDataType: bigint
            defaultNullValue: 0
  - changeSet:
      id: create-gifticon
      author: DevTeller
      changes:
        - createTable:
            tableName: rpt_product
            columns:
              - column:
                  name: rpt_product_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: brand
                  type: varchar(100)
              - column:
                  name: image_url
                  type: varchar(500)
              - column:
                  name: point_cost
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  constraints:
                    nullable: false
              - column: { name: crt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: crt_by, type: bigint, constraints: { nullable: false } }
              - column: { name: udt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: udt_by, type: bigint, constraints: { nullable: false } }
        - createTable:
            tableName: rpt_gift_inventory
            columns:
              - column:
                  name: gift_inventory_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: barcode_image_url
                  type: varchar(500)
              - column:
                  name: valid_until
                  type: date
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: redemption_order_id
                  type: bigint
              - column: { name: crt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: crt_by, type: bigint, constraints: { nullable: false } }
              - column: { name: udt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: udt_by, type: bigint, constraints: { nullable: false } }
        - createIndex:
            tableName: rpt_gift_inventory
            indexName: idx_inventory_product_status
            columns:
              - column:
                  name: product_id
              - column:
                  name: status
        - createTable:
            tableName: rpt_redemption_order
            columns:
              - column:
                  name: redemption_order_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: point_cost
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: idempotency_key
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: gift_inventory_id
                  type: bigint
              - column: { name: crt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: crt_by, type: bigint, constraints: { nullable: false } }
              - column: { name: udt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: udt_by, type: bigint, constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: rpt_redemption_order
            columnNames: idempotency_key
            constraintName: uk_redemption_idem
  - changeSet:
      id: create-point-ledger
      author: DevTeller
      changes:
        - createTable:
            tableName: report_point
            columns:
              - column:
                  name: report_point_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: point_amt_div
                  type: varchar(8)
                  constraints:
                    nullable: false
              - column:
                  name: point_amt
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: varchar(8)
                  constraints:
                    nullable: false
              - column:
                  name: ref_type
                  type: varchar(8)
              - column:
                  name: ref_id
                  type: bigint
              - column: { name: crt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: crt_by, type: bigint, constraints: { nullable: false } }
              - column: { name: udt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: udt_by, type: bigint, constraints: { nullable: false } }
        - createIndex:
            tableName: report_point
            indexName: idx_point_user
            columns:
              - column:
                  name: user_id
        # 기존 소비 적립을 원장으로 backfill (GOOD=적립 RE030001, BAD=차감 RE030002, 포인트 있는 건만).
        # 분류/사유/출처유형은 CodeEnum code로 저장. QUOTE_ALL_OBJECTS에 맞춰 식별자 인용.
        - sql:
            dbms: postgresql, h2
            sql: >-
              INSERT INTO "report_point" ("user_id", "point_amt_div", "point_amt", "reason", "ref_type", "ref_id", "crt_at", "crt_by", "udt_at", "udt_by")
              SELECT "user_id",
                     CASE WHEN "cost_dvsn" = 'GOOD' THEN 'RE030001' ELSE 'RE030002' END,
                     "cost_pnt", 'RE010001', 'RE020001', "rpt_cost_id",
                     now(), "user_id", now(), "user_id"
              FROM "rpt_cost"
              WHERE "cost_dvsn" IS NOT NULL AND "cost_pnt" IS NOT NULL;
  - changeSet:
      id: create-cost-category
      author: DevTeller
      changes:
        - createTable:
            tableName: rpt_cost_cat
            columns:
              - column:
                  name: rpt_cost_category_id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: cat_nm
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column: { name: crt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: crt_by, type: bigint, constraints: { nullable: false } }
              - column: { name: udt_at, type: datetime, defaultValue: "${function.now}", constraints: { nullable: false } }
              - column: { name: udt_by, type: bigint, constraints: { nullable: false } }
        - createIndex:
            tableName: rpt_cost_cat
            indexName: idx_cost_cat_user
            columns:
              - column:
                  name: user_id
  - changeSet:
      id: link-cost-to-category
      author: DevTeller
      changes:
        # 기존 소비의 (user_id, cat_nm) 조합으로 카테고리를 backfill 한다.
        - sql:
            dbms: postgresql, h2
            sql: >-
              INSERT INTO "rpt_cost_cat" ("user_id", "cat_nm", "crt_at", "crt_by", "udt_at", "udt_by")
              SELECT DISTINCT "user_id", "cat_nm", now(), "user_id", now(), "user_id"
              FROM "rpt_cost";
        - addColumn:
            tableName: rpt_cost
            columns:
              - column:
                  name: rpt_cost_category_id
                  type: bigint
        # 방금 만든 카테고리를 (user_id, cat_nm) 기준으로 소비 행에 연결한다.
        - sql:
            dbms: postgresql, h2
            sql: >-
              UPDATE "rpt_cost"
              SET "rpt_cost_category_id" = (
                SELECT "cat"."rpt_cost_category_id"
                FROM "rpt_cost_cat" "cat"
                WHERE "cat"."user_id" = "rpt_cost"."user_id"
                  AND "cat"."cat_nm" = "rpt_cost"."cat_nm"
              );
        - addNotNullConstraint:
            tableName: rpt_cost
            columnName: rpt_cost_category_id
            columnDataType: bigint
            defaultNullValue: 0
        - dropColumn:
            tableName: rpt_cost
            columnName: cat_nm
  - changeSet:
      id: add-cost-category-color
      author: DevTeller
      changes:
        - addColumn:
            tableName: rpt_cost_cat
            columns:
              - column:
                  name: cat_color
                  type: varchar(7)
        # 기존 카테고리에 유저별 순번(자기보다 작은 id 개수) % 12 로 팔레트 색을 분산 배정한다.
        # (S=0.5, V=0.82 HSV 휠을 30°씩 돌린 색 — 신규 생성 색과 톤이 일치)
        - sql:
            dbms: postgresql, h2
            sql: >-
              UPDATE "rpt_cost_cat" c
              SET "cat_color" = CASE ((
                  SELECT COUNT(*) FROM "rpt_cost_cat" c2
                  WHERE c2."user_id" = c."user_id"
                    AND c2."rpt_cost_category_id" < c."rpt_cost_category_id"
                ) % 12)
                WHEN 0 THEN '#D16969'
                WHEN 1 THEN '#D19D69'
                WHEN 2 THEN '#D1D169'
                WHEN 3 THEN '#9DD169'
                WHEN 4 THEN '#69D169'
                WHEN 5 THEN '#69D19D'
                WHEN 6 THEN '#69D1D1'
                WHEN 7 THEN '#699DD1'
                WHEN 8 THEN '#6969D1'
                WHEN 9 THEN '#9D69D1'
                WHEN 10 THEN '#D169D1'
                ELSE '#D1699D'
              END;
        - addNotNullConstraint:
            tableName: rpt_cost_cat
            columnName: cat_color
            columnDataType: varchar(7)
            defaultNullValue: '#9B70D0'
