name: Deploy to Lightsail

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/seculoper235/report-front-api

jobs:
  # 1) 이미지 빌드 → GHCR push (러너에서 빌드, 인스턴스는 빌드하지 않음)
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2) 서버에 compose/.env 전달 후 pull & up (빌드 없음)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # 서버엔 소스 전체가 아니라 docker/ (compose 파일)만 있으면 된다.
      - name: Sync compose to server
        run: |
          rsync -az --delete \
            --exclude '.env*' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new" \
            ./docker/ "${{ vars.SSH_USER }}@${{ vars.LIGHTSAIL_HOST }}:~/report-front-api/docker/"

      - name: Build .env.prod
        run: |
          cat > .env.prod <<EOF
          DB_HOST=${{ vars.DB_HOST }}
          REDIS_HOST=${{ vars.REDIS_HOST }}
          DB_USER=${{ vars.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JAVA_OPTS=${{ vars.JAVA_OPTS }}
          AWS_REGION=${{ vars.AWS_REGION }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_PUBLIC_BUCKET=${{ vars.AWS_S3_PUBLIC_BUCKET }}
          AWS_S3_PRIVATE_BUCKET=${{ vars.AWS_S3_PRIVATE_BUCKET }}
          EOF

      - name: Copy .env.prod to server
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            .env.prod "${{ vars.SSH_USER }}@${{ vars.LIGHTSAIL_HOST }}:~/report-front-api/docker/.env.prod"

      - name: Deploy (pull & up)
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            "${{ vars.SSH_USER }}@${{ vars.LIGHTSAIL_HOST }}" <<EOF
          set -euo pipefail
          cd ~/report-front-api
          chmod 600 docker/.env.prod
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose -f docker/docker-compose.prod.yml --env-file docker/.env.prod pull
          docker compose -f docker/docker-compose.prod.yml --env-file docker/.env.prod up -d
          docker logout ghcr.io
          docker image prune -f
          EOF

      - name: Health check
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            "${{ vars.SSH_USER }}@${{ vars.LIGHTSAIL_HOST }}" \
            'for i in $(seq 1 30); do curl -fsS http://localhost:8080/actuator/health && exit 0; sleep 3; done; echo "health check failed"; exit 1'
