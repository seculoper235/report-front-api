name: front-prod

# front-api 전용 호스트. DB/Redis는 별도 데이터 노드(report-data)에 있으며
# Tailscale IP(DB_HOST/REDIS_HOST)로 접속한다.
# API의 8080만 호스트에 노출하되, 클라우드 방화벽에서는 8080을 인터넷에 열지 말고
# Tailscale(tailnet)을 통해서만 접근한다.
#
# 실행: docker compose -f docker/docker-compose.prod.yml --env-file docker/.env.prod up -d --build
services:
  api:
    # 이미지는 GitHub Actions가 빌드해 GHCR에 push한다. 서버는 pull만 한다(인스턴스 빌드 X).
    image: ghcr.io/seculoper235/report-front-api:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: server
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
      # 데이터 노드의 Tailscale IP (.env.prod 에서 주입)
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_PUBLIC_BUCKET: ${AWS_S3_PUBLIC_BUCKET}
      AWS_S3_PRIVATE_BUCKET: ${AWS_S3_PRIVATE_BUCKET}
    ports:
      - "8080:8080"
