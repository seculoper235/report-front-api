name: report-data

# 전용 데이터 노드 — Postgres + Redis 만 운영한다.
# front-api / admin-api 호스트가 이 노드의 Tailscale IP로 접속한다.
#
# 보안: 포트를 이 노드의 Tailscale IP(DATA_BIND_IP)에만 바인딩한다.
#       → 공개 인터페이스(공인 IP)에는 열리지 않고 tailnet에서만 접근 가능.
#       추가로 Lightsail 방화벽에서 5432/6379를 인터넷에 절대 열지 않는다.
#
# 실행: docker compose -f docker/docker-compose.data.yml --env-file docker/.env.data up -d
services:
  daily-db:
    image: postgres:15.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: daily
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DATA_BIND_IP}:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d daily"]
      interval: 10s
      timeout: 5s
      retries: 5

  daily-redis:
    image: redis:7.2
    restart: unless-stopped
    # tailnet에 노출되므로 비밀번호 필수.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "${DATA_BIND_IP}:6379:6379"

volumes:
  pgdata:
  redisdata:
